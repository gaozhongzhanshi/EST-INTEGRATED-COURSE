<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科技英语综合教程 - 翻译练习</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4f46e5;--primary-light:#818cf8;--primary-bg:#eef2ff;--success:#16a34a;--success-bg:#dcfce7;--danger:#dc2626;--danger-bg:#fee2e2;--gray:#64748b;--gray-light:#f1f5f9;--border:#e2e8f0;--radius:12px;--shadow:0 1px 3px rgba(0,0,0,.1)}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f8fafc;color:#1e293b;line-height:1.6}
.container{max-width:900px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0 20px}
header h1{font-size:1.8rem;color:var(--primary);margin-bottom:6px}
header p{color:var(--gray);font-size:.95rem}
nav{display:flex;gap:10px;justify-content:center;margin-bottom:30px;flex-wrap:wrap}
nav button{padding:10px 24px;border:2px solid var(--border);background:#fff;border-radius:var(--radius);cursor:pointer;font-size:.95rem;font-weight:600;color:var(--gray);transition:.2s}
nav button:hover{border-color:var(--primary-light);color:var(--primary)}
nav button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.section{display:none}
.section.active{display:block}
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:16px}
.card h2{font-size:1.2rem;color:var(--primary);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--primary-bg)}
.unit-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.unit-btn{padding:8px 18px;border:2px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:500;transition:.2s}
.unit-btn:hover{border-color:var(--primary-light)}
.unit-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:.9rem}
th{background:var(--primary-bg);color:var(--primary);font-weight:600;position:sticky;top:0}
tr:hover{background:var(--gray-light)}
td:first-child{width:40px;color:var(--gray);text-align:center}
td:nth-child(2){width:45%;font-weight:500}
td:nth-child(3){width:45%}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:600;margin-left:6px}
.tag-en{background:#dbeafe;color:#2563eb}
.tag-cn{background:#fce7f3;color:#db2777}
.quiz-setup{margin-bottom:20px}
.quiz-setup label{display:block;font-weight:600;margin-bottom:8px;color:#374151}
.quiz-setup select,.quiz-setup input{padding:8px 12px;border:2px solid var(--border);border-radius:8px;font-size:.95rem;width:100%;max-width:300px}
.quiz-mode-select{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.quiz-mode-select button{padding:10px 20px;border:2px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-weight:500;transition:.2s}
.quiz-mode-select button:hover{border-color:var(--primary-light)}
.quiz-mode-select button.active{background:var(--primary-bg);color:var(--primary);border-color:var(--primary)}
.start-btn{padding:12px 36px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:1rem;font-weight:600;cursor:pointer;transition:.2s;margin-top:10px}
.start-btn:hover{background:#4338ca}
.quiz-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:30px;text-align:center}
.quiz-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;color:var(--gray);font-size:.9rem}
.progress-bar{width:100%;height:6px;background:var(--border);border-radius:3px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--primary);border-radius:3px;transition:width .3s}
.quiz-question{font-size:1.1rem;font-weight:600;margin:20px 0;min-height:60px;display:flex;align-items:center;justify-content:center}
.quiz-input{width:100%;max-width:500px;padding:12px 16px;border:2px solid var(--border);border-radius:8px;font-size:1rem;text-align:center;margin:0 auto;display:block;transition:.2s}
.quiz-input:focus{outline:none;border-color:var(--primary)}
.quiz-input.correct{border-color:var(--success);background:var(--success-bg)}
.quiz-input.wrong{border-color:var(--danger);background:var(--danger-bg)}
.quiz-actions{margin-top:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{padding:10px 24px;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:#4338ca}
.btn-secondary{background:var(--gray-light);color:var(--gray)}
.btn-secondary:hover{background:#e2e8f0}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{padding:6px 14px;font-size:.85rem}
.answer-reveal{margin-top:16px;padding:16px;border-radius:8px;font-size:.95rem}
.answer-reveal.correct{background:var(--success-bg);color:var(--success)}
.answer-reveal.wrong{background:var(--danger-bg);color:var(--danger)}
.answer-reveal .answer-label{font-weight:600;margin-bottom:4px}
.result-card{text-align:center;padding:40px}
.result-score{font-size:3rem;font-weight:700;color:var(--primary);margin:20px 0}
.result-detail{color:var(--gray);margin-bottom:24px}
.hidden{display:none}
.toggle-answer{padding:8px 16px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:.85rem;color:var(--gray);margin-top:8px;transition:.2s}
.toggle-answer:hover{border-color:var(--primary);color:var(--primary)}
@media(max-width:640px){
  .container{padding:12px}
  header h1{font-size:1.4rem}
  th,td{padding:8px 6px;font-size:.82rem}
  .quiz-question{font-size:1rem}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>科技英语综合教程</h1>
    <p>翻译练习 & 刷题系统</p>
  </header>

  <nav>
    <button class="active" onclick="switchMode('review')">复习模式</button>
    <button onclick="switchMode('quiz')">刷题模式</button>
  </nav>

  <div id="reviewSection" class="section active">
    <div class="card">
      <h2>选择单元</h2>
      <div class="unit-select" id="unitSelect"></div>
    </div>
    <div id="reviewContent" style="display:none">
      <div class="card" id="reviewSectionA">
        <h2 id="reviewTitleA"></h2>
        <p style="color:var(--gray);margin-bottom:12px;font-size:.9rem">A. 英译中 — 看英文，说出中文翻译</p>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>#</th><th>英文</th><th>中文</th></tr></thead>
            <tbody id="reviewTableA"></tbody>
          </table>
        </div>
      </div>
      <div class="card" id="reviewSectionB">
        <h2 id="reviewTitleB"></h2>
        <p style="color:var(--gray);margin-bottom:12px;font-size:.9rem">B. 中译英 — 看中文，说出英文翻译</p>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>#</th><th>中文</th><th>英文</th></tr></thead>
            <tbody id="reviewTableB"></tbody>
          </table>
        </div>
      </div>
      <div class="card" id="reviewSectionC">
        <h2 id="reviewTitleC"></h2>
        <p style="color:var(--gray);margin-bottom:12px;font-size:.9rem">C. 句子英译中 — 看英文句子，说出中文翻译</p>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>#</th><th>英文句子</th><th>中文翻译</th></tr></thead>
            <tbody id="reviewTableC"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="quizSection" class="section">
    <div class="card" id="quizSetup">
      <h2>刷题设置</h2>
      <div class="quiz-setup">
        <label>题型</label>
        <div class="quiz-mode-select" id="quizTypeSelect">
          <button class="active" data-type="all">全部混合</button>
          <button data-type="en2cn">A. 英译中</button>
          <button data-type="cn2en">B. 中译英</button>
          <button data-type="sentence">C. 句子翻译</button>
        </div>
      </div>
      <div class="quiz-setup">
        <label>范围</label>
        <div class="unit-select" id="quizUnitSelect"></div>
      </div>
      <div class="quiz-setup">
        <label>题目数量</label>
        <select id="quizCount">
          <option value="10">10 题</option>
          <option value="20" selected>20 题</option>
          <option value="50">50 题</option>
          <option value="0">全部</option>
        </select>
      </div>
      <button class="start-btn" onclick="startQuiz()">开始刷题</button>
    </div>

    <div class="card hidden" id="quizArea">
      <div class="quiz-progress">
        <span id="quizProgressText"></span>
        <span id="quizScoreText"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="quiz-question" id="quizQuestion"></div>
      <input class="quiz-input" id="quizInput" placeholder="输入翻译..." autocomplete="off">
      <textarea class="quiz-input hidden" id="quizTextarea" placeholder="输入翻译..." rows="4" style="resize:vertical;max-width:600px"></textarea>
      <div class="answer-reveal hidden" id="answerReveal"></div>
      <div class="quiz-actions" id="quizActions">
        <button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()">确认</button>
        <button class="btn btn-secondary hidden" id="nextBtn" onclick="nextQuestion()">下一题</button>
      </div>
    </div>

    <div class="card hidden" id="quizResult">
      <div class="result-card">
        <h2>练习完成</h2>
        <div class="result-score" id="resultScore"></div>
        <div class="result-detail" id="resultDetail"></div>
        <div id="wrongList" style="text-align:left;margin:20px 0"></div>
        <button class="btn btn-primary" onclick="restartQuiz()">再来一次</button>
        <button class="btn btn-secondary" onclick="backToSetup()">返回设置</button>
      </div>
    </div>
  </div>
</div>

<script>
const DATA = {
  1: {
    title: "Unit 1 - 博弈论",
    words: [
      { en: "mutual gain game and mutual harm game", cn: "互赢博弈和互败博弈", type: "en2cn" },
      { en: "sequential-move game", cn: "连续策略博弈", type: "en2cn" },
      { en: "simultaneous-move game", cn: "联立策略博弈", type: "en2cn" },
      { en: "linear reasoning", cn: "直线推理", type: "en2cn" },

      { en: "breakdown of cooperation", cn: "合作分裂", type: "en2cn" },
      { en: "strategy of brinkmanship", cn: "边缘化策略", type: "en2cn" },
      { en: "pure conflict", cn: "完全博弈", type: "cn2en" },
      { en: "competition and cooperation", cn: "竞争与合作", type: "cn2en" },
      { en: "strategic interdependence", cn: "策略性相互作用", type: "cn2en" },
      { en: "prisoners' dilemma", cn: "囚徒困境", type: "cn2en" },
      { en: "long-run loss", cn: "长远性损失", type: "cn2en" },
      { en: "tit-for-tat strategy", cn: "针锋相对策略", type: "cn2en" },
      { en: "mixing one's moves", cn: "混合性策略", type: "cn2en" },
      { en: "hit a passing shot cross-court or down the line", cn: "(网球)斜线球或底线球", type: "cn2en" },
      { en: "monopoly market", cn: "垄断性市场", type: "cn2en" },
      { en: "equilibrium shares", cn: "均衡份额", type: "cn2en" }
    ],
    sentences: [
      { en: "The essence of a game is the interdependence of player strategies. There are two distinct types of strategic interdependence: sequential and simultaneous.", cn: "博弈的实质是博弈者采取策略之间的相互依赖性。这种策略性的相互依赖表现为两个不同的类别：连续策略之间的相互作用以及联立策略之间的相互作用。" },
      { en: "When we say that an outcome is an equilibrium, there is no presumption that each person's privately best choice will lead to a collectively optimal result.", cn: "当我们把博弈的结果表述为一种均衡的时候，并不是基于以下的假设：即博弈的每个参与者的个人最佳策略将会带来共同的最优化结果。" },
      { en: "In some situations of conflict, any systematic action will be discovered and exploited by the rival. Therefore, it is important to keep the rival guessing by mixing one's moves.", cn: "在一些博弈的冲突中，任何条理化和计划性的行为都会被对手发现并加以利用。因此，通过采用组合性策略使对手迷惑就显得非常重要。" },
      { en: "Brinkmanship is the tactic of deliberately letting the situation get somewhat out of hand, just because its being out of hand may be intolerable to the other party and force his accommodation.", cn: "边缘政策是一种故意使局势变得有些无法控制的策略，正是这种无法控制性可能会使另一方无法接受而选择妥协。" },
      { en: "When one player knows something that others do not, sometimes he is anxious to conceal this information, and at other times he wants to reveal it credibly. In both cases the general principle is that actions speak louder than words.", cn: "当博弈的一方了解其他人所不掌握的信息时，他会急于隐瞒这一信息，在其他一些情况下，他还会想令人信服的公开某些信息。在这两种情况下，行胜于言是博弈者遵循的基本原则。" }
    ]
  },
  2: {
    title: "Unit 2 - 纳米医学",
    words: [
      { en: "magnetic resonance imaging", cn: "磁共振成像", type: "en2cn" },
      { en: "hydrogen proton", cn: "氢质子", type: "en2cn" },
      { en: "magnetic property", cn: "磁性", type: "en2cn" },
      { en: "nanocrystal", cn: "纳米晶体", type: "en2cn" },
      { en: "contrast agent", cn: "造影剂，对比剂", type: "en2cn" },
      { en: "quantum dot", cn: "量子点", type: "en2cn" },
      { en: "cadmium selenide", cn: "硒化镉", type: "en2cn" },
      { en: "carbon nanotube", cn: "纳米碳管", type: "en2cn" },
      { en: "epithelial cell", cn: "上皮细胞", type: "en2cn" },
      { en: "near-infrared laser", cn: "近红外线激光", type: "en2cn" },
      { en: "death rate / mortality", cn: "死亡率", type: "cn2en" },
      { en: "iron oxide", cn: "氧化铁", type: "cn2en" },
      { en: "membrane", cn: "细胞膜", type: "cn2en" },
      { en: "mechanical effect", cn: "机械效应", type: "cn2en" },
      { en: "side effect", cn: "副作用", type: "cn2en" },
      { en: "antibody", cn: "抗体", type: "cn2en" },
      { en: "radiation therapy", cn: "放射疗法", type: "cn2en" },
      { en: "a cell line", cn: "细胞系", type: "cn2en" },
      { en: "advanced tumor", cn: "晚期肿瘤", type: "cn2en" },
      { en: "biological agent", cn: "生物制剂", type: "cn2en" }
    ],
    sentences: [
      { en: "The devices can be designed to specifically target and enter tumor cells. Once inside, they can deliver any number of payloads, from agents that improve cancer detection to treatments such as drugs or genes.", cn: "这种纳米装置可以设计用来靶向并进入肿瘤细胞。一旦进入，它们就可以携带提高癌症检测的制剂及癌症治疗的药物或基因等许多有效载荷。" },
      { en: "Adjusting the particles' sizes creates probes that, when stimulated by light, emit distinct amounts of energy, or different colors of light.", cn: "调整颗粒的大小就形成了探针，当光束照射探针时，它就会放射出大量清晰可见的能量，或者是不同颜色的光。" },
      { en: "The researchers then injected the targeted drug-dendrimer complexes intravenously into mice riddled with human epithelial-cell cancer.", cn: "研究人员接着将靶向药物树枝状聚合物通过静脉注射到移植了人类上皮细胞的小鼠身上。" },
      { en: "Because flesh is transparent to light in this wavelength range, targeting nanotubes to cancer cells and then hitting them with a near-infrared laser could turn the tubes into weapons that kill the cells with heat.", cn: "由于肌肉在这个波长内具有透光性，将纳米管靶向癌细胞并用近红外线激光照射，就能将纳米管变成用高温杀死癌细胞的武器。" },

    ]
  },
  3: {
    title: "Unit 3 - 干细胞",
    words: [
      { en: "spinal cord injury", cn: "脊髓损伤", type: "en2cn" },
      { en: "an exclusive license", cn: "专用许可证", type: "en2cn" },
      { en: "natural healing", cn: "自然愈合", type: "en2cn" },
      { en: "central nervous system", cn: "中枢神经系统", type: "en2cn" },
      { en: "feeder cells", cn: "供养细胞，滋养细胞", type: "en2cn" },
      { en: "foreign", cn: "异质的", type: "en2cn" },
      { en: "cultured cells", cn: "(人工)培养的细胞", type: "en2cn" },

      { en: "These cells can form oligodendrocytes, the cells that, among other functions, produce the protective myelin sheath that allows neurons to send signals along their axons.", cn: "该细胞可形成少突神经胶质细胞，其功能之一是产生保护性髓磷脂鞘使神经元能够沿着神经轴突传递信号。" },

  4: {

      { en: "QoS (Quality of Service)", cn: "服务质量", type: "en2cn" },

let currentMode = 'review';

let quizType = 'all';
let quizQueue = [];

let quizCorrect = 0;
let quizWrong = [];
let answered = false;

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('reviewSection').classList.toggle('active', mode === 'review');
  document.getElementById('quizSection').classList.toggle('active', mode === 'quiz');
}

function initUnitButtons() {
  const units = Object.keys(DATA);
  ['unitSelect', 'quizUnitSelect'].forEach(containerId => {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.textContent = '全部';
    allBtn.className = containerId === 'unitSelect' ? 'unit-btn' : 'unit-btn active';
    if (containerId === 'unitSelect') {
      allBtn.onclick = () => selectReviewUnit(null);
    } else {
      allBtn.onclick = () => toggleAllQuizUnits(allBtn);
    }
    container.appendChild(allBtn);
    units.forEach(u => {
      const btn = document.createElement('button');
      btn.textContent = `Unit ${u}`;
      btn.className = 'unit-btn' + (containerId === 'quizUnitSelect' ? ' active' : '');
      btn.dataset.unit = u;
      if (containerId === 'unitSelect') {
        btn.onclick = () => selectReviewUnit(parseInt(u));
      } else {
        btn.onclick = () => toggleQuizUnit(parseInt(u), btn);
      }
      container.appendChild(btn);
    });
  });
}

function selectReviewUnit(unit) {
  selectedReviewUnit = unit;
  document.querySelectorAll('#unitSelect .unit-btn').forEach(b => b.classList.remove('active'));
  if (unit === null) {
    document.querySelector('#unitSelect .unit-btn').classList.add('active');
  } else {
    document.querySelector(`#unitSelect .unit-btn[data-unit="${unit}"]`).classList.add('active');
  }
  renderReview();
}

function renderReview() {
  const content = document.getElementById('reviewContent');
  const tableA = document.getElementById('reviewTableA');
  const tableB = document.getElementById('reviewTableB');
  const tableC = document.getElementById('reviewTableC');
  const titleA = document.getElementById('reviewTitleA');
  const titleB = document.getElementById('reviewTitleB');
  const titleC = document.getElementById('reviewTitleC');
  content.style.display = 'block';

  let allWords = [];
  let allSentences = [];
  if (selectedReviewUnit === null) {
    titleA.textContent = '全部单元 — A. 英译中';
    titleB.textContent = '全部单元 — B. 中译英';
    titleC.textContent = '全部单元 — C. 句子翻译';
    Object.keys(DATA).forEach(u => {
      DATA[u].words.forEach(item => allWords.push({ ...item, unit: u }));
      DATA[u].sentences.forEach(item => allSentences.push({ ...item, unit: u }));
    });
  } else {
    titleA.textContent = DATA[selectedReviewUnit].title + ' — A. 英译中';
    titleB.textContent = DATA[selectedReviewUnit].title + ' — B. 中译英';
    titleC.textContent = DATA[selectedReviewUnit].title + ' — C. 句子翻译';
    DATA[selectedReviewUnit].words.forEach(item => allWords.push({ ...item, unit: selectedReviewUnit }));
    DATA[selectedReviewUnit].sentences.forEach(item => allSentences.push({ ...item, unit: selectedReviewUnit }));
  }

  const itemsA = allWords.filter(i => i.type === 'en2cn');
  const itemsB = allWords.filter(i => i.type === 'cn2en');

  tableA.innerHTML = itemsA.map((item, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${item.en}</td>
      <td>${item.cn}</td>
    </tr>
  `).join('');

  tableB.innerHTML = itemsB.map((item, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${item.cn}</td>
      <td>${item.en}</td>
    </tr>
  `).join('');

  tableC.innerHTML = allSentences.map((item, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${item.en}</td>
      <td>${item.cn}</td>
    </tr>
  `).join('');
}

function toggleAllQuizUnits(btn) {
  if (quizUnits.size === 7) {
    quizUnits.clear();
    document.querySelectorAll('#quizUnitSelect .unit-btn').forEach(b => b.classList.remove('active'));
  } else {
    quizUnits = new Set([1,2,3,4,5,6,7]);
    document.querySelectorAll('#quizUnitSelect .unit-btn').forEach(b => b.classList.add('active'));
  }
}

function toggleQuizUnit(unit, btn) {
  if (quizUnits.has(unit)) {
    quizUnits.delete(unit);
    btn.classList.remove('active');
  } else {
    quizUnits.add(unit);
    btn.classList.add('active');
  }
  const allBtn = document.querySelector('#quizUnitSelect .unit-btn');
  if (quizUnits.size === 7) allBtn.classList.add('active');
  else allBtn.classList.remove('active');
}

document.getElementById('quizTypeSelect').addEventListener('click', (e) => {
  if (e.target.tagName !== 'BUTTON') return;
  document.querySelectorAll('#quizTypeSelect button').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  quizType = e.target.dataset.type;
});

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getAllItems() {
  let items = [];
  quizUnits.forEach(u => {
    DATA[u].words.forEach(item => items.push({ ...item, unit: u }));
    DATA[u].sentences.forEach(item => items.push({ en: item.en, cn: item.cn, type: 'sentence', unit: u }));
  });
  return items;
}

function startQuiz() {
  if (quizUnits.size === 0) { alert('请至少选择一个单元'); return; }
  let items = getAllItems();
  if (quizType !== 'all') {
    items = items.filter(i => i.type === quizType);
  }
  items = shuffle(items);
  const count = parseInt(document.getElementById('quizCount').value);
  if (count > 0) items = items.slice(0, count);
  if (items.length === 0) { alert('该条件下没有题目'); return; }

  quizQueue = items;
  quizIndex = 0;
  quizCorrect = 0;
  quizWrong = [];
  answered = false;

  document.getElementById('quizSetup').classList.add('hidden');
  document.getElementById('quizResult').classList.add('hidden');
  document.getElementById('quizArea').classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  const q = quizQueue[quizIndex];
  const total = quizQueue.length;
  document.getElementById('quizProgressText').textContent = `第 ${quizIndex + 1} / ${total} 题`;
  document.getElementById('quizScoreText').textContent = `正确: ${quizCorrect}`;
  document.getElementById('progressFill').style.width = `${((quizIndex) / total) * 100}%`;

  const inputEl = document.getElementById('quizInput');
  const textareaEl = document.getElementById('quizTextarea');
  const isSentence = q.type === 'sentence';

  inputEl.classList.toggle('hidden', isSentence);
  textareaEl.classList.toggle('hidden', !isSentence);

  if (q.type === 'sentence') {
    document.getElementById('quizQuestion').innerHTML = `<span class="tag" style="background:#dbeafe;color:#2563eb">句子翻译</span><br><br><div style="font-size:.95rem;line-height:1.8;text-align:left;max-width:600px;margin:0 auto">${q.en}</div>`;
  } else if (q.type === 'en2cn') {
    document.getElementById('quizQuestion').innerHTML = `<span class="tag tag-en">英译中</span><br><br>${q.en}`;
  } else {
    document.getElementById('quizQuestion').innerHTML = `<span class="tag tag-cn">中译英</span><br><br>${q.cn}`;
  }

  const activeInput = isSentence ? textareaEl : inputEl;
  activeInput.value = '';
  activeInput.className = isSentence ? 'quiz-input' : 'quiz-input';
  activeInput.disabled = false;
  activeInput.focus();
  answered = false;
  document.getElementById('answerReveal').classList.add('hidden');
  document.getElementById('submitBtn').classList.remove('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
}

function normalize(s) {
  return s.trim().toLowerCase().replace(/[\s\-_,.，。、；;：:！!？?""''()（）\[\]【】{}《》]+/g, ' ').replace(/\s+/g, ' ').trim();
}

function submitAnswer() {
  if (answered) return;
  answered = true;
  const q = quizQueue[quizIndex];
  const isSentence = q.type === 'sentence';
  const input = isSentence ? document.getElementById('quizTextarea') : document.getElementById('quizInput');
  const userAnswer = input.value.trim();
  if (!userAnswer) { answered = false; input.focus(); return; }

  const correctAnswer = q.type === 'cn2en' ? q.en : q.cn;
  input.disabled = true;
  const reveal = document.getElementById('answerReveal');
  reveal.classList.remove('hidden');

  if (q.type === 'sentence') {
    reveal.className = 'answer-reveal';
    reveal.style.background = '#f8fafc';
    reveal.style.border = '2px solid var(--border)';
    reveal.style.color = '#1e293b';
    reveal.innerHTML = `
      <div style="margin-bottom:10px"><strong>你的翻译：</strong><br><div style="margin-top:4px;padding:8px;background:#fff;border-radius:6px;border:1px solid var(--border)">${userAnswer}</div></div>
      <div style="margin-bottom:12px"><strong>参考答案：</strong><br><div style="margin-top:4px;padding:8px;background:#fff;border-radius:6px;border:1px solid var(--border)">${correctAnswer}</div></div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-success btn-sm" onclick="markSentence(true)">我答对了</button>
        <button class="btn btn-danger btn-sm" onclick="markSentence(false)">我答错了</button>
      </div>
    `;
    document.getElementById('submitBtn').classList.add('hidden');
    return;
  }

  const userNorm = normalize(userAnswer);
  const correctNorm = normalize(correctAnswer);

  const isCorrect = userNorm === correctNorm
    || correctNorm.includes(userNorm)
    || userNorm.includes(correctNorm);

  if (isCorrect) {
    quizCorrect++;
    input.className = 'quiz-input correct';
    reveal.className = 'answer-reveal correct';
    reveal.innerHTML = `<div class="answer-label">✓ 正确</div>标准答案：${correctAnswer}`;
  } else {
    quizWrong.push({ q, userAnswer });
    input.className = 'quiz-input wrong';
    reveal.className = 'answer-reveal wrong';
    reveal.innerHTML = `<div class="answer-label">✗ 错误</div>你的答案：${userAnswer}<br>标准答案：${correctAnswer}`;
  }

  document.getElementById('quizScoreText').textContent = `正确: ${quizCorrect}`;
  document.getElementById('submitBtn').classList.add('hidden');
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').focus();
}

function markSentence(isCorrect) {
  const q = quizQueue[quizIndex];
  const input = document.getElementById('quizTextarea');
  const userAnswer = input.value.trim();
  const correctAnswer = q.cn;
  const reveal = document.getElementById('answerReveal');

  reveal.style.background = '';
  reveal.style.border = '';
  reveal.style.color = '';

  if (isCorrect) {
    quizCorrect++;
    input.className = 'quiz-input correct';
    reveal.className = 'answer-reveal correct';
    reveal.innerHTML = `<div class="answer-label">✓ 正确</div>参考答案：${correctAnswer}`;
  } else {
    quizWrong.push({ q, userAnswer });
    input.className = 'quiz-input wrong';
    reveal.className = 'answer-reveal wrong';
    reveal.innerHTML = `<div class="answer-label">✗ 错误</div>标准答案：${correctAnswer}`;
  }

  document.getElementById('quizScoreText').textContent = `正确: ${quizCorrect}`;
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').focus();
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizQueue.length) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  document.getElementById('quizArea').classList.add('hidden');
  document.getElementById('quizResult').classList.remove('hidden');
  const total = quizQueue.length;
  const pct = Math.round((quizCorrect / total) * 100);
  document.getElementById('resultScore').textContent = `${pct}%`;
  document.getElementById('resultDetail').textContent = `${total} 题中答对 ${quizCorrect} 题`;

  const wrongDiv = document.getElementById('wrongList');
  if (quizWrong.length === 0) {
    wrongDiv.innerHTML = '<p style="text-align:center;color:var(--success);font-weight:600">全部正确，太棒了！</p>';
  } else {
    wrongDiv.innerHTML = '<h3 style="margin-bottom:12px;color:var(--danger)">错题回顾</h3>' +
      quizWrong.map(({ q, userAnswer }) => {
        const question = q.type === 'cn2en' ? q.cn : (q.en.length > 60 ? q.en.substring(0, 60) + '...' : q.en);
        const answer = q.type === 'cn2en' ? q.en : q.cn;
        const typeLabel = q.type === 'sentence' ? '句子翻译' : (q.type === 'en2cn' ? '英译中' : '中译英');
        return `<div style="padding:10px;margin-bottom:8px;background:var(--danger-bg);border-radius:8px;border-left:4px solid var(--danger)">
          <div style="font-size:.8rem;color:var(--gray);margin-bottom:4px">${typeLabel}</div>
          <div><strong>题目：</strong>${question}</div>
          <div><strong>你的答案：</strong>${userAnswer}</div>
          <div><strong>正确答案：</strong>${answer}</div>
        </div>`;
      }).join('');
  }
  document.getElementById('progressFill').style.width = '100%';
}

function restartQuiz() {
  startQuiz();
}

function backToSetup() {
  document.getElementById('quizResult').classList.add('hidden');
  document.getElementById('quizSetup').classList.remove('hidden');
}

document.getElementById('quizInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    if (!answered) submitAnswer();
    else nextQuestion();
  }
});

document.getElementById('quizTextarea').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!answered) submitAnswer();
    else nextQuestion();
  }
});

initUnitButtons();
selectReviewUnit(null);
</script>
</body>
</html>
